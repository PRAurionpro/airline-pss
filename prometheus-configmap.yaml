apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      external_labels:
        cluster: pss-dev

    # Alert rules loaded from the payments-alert-rules ConfigMap (mounted at
    # /etc/prometheus/rules/ by the Prometheus deployment — see deployment.yaml).
    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      # Scrape pods annotated prometheus.io/scrape=true (the paved-road service
      # /actuator/prometheus). Honours prometheus.io/path and prometheus.io/port.
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: app
